- name: Deploy Nginx on OpenShift via API (AAP)
  hosts: localhost
  gather_facts: no

  vars:
    oc_host: "https://api.rm3.7wse.p1.openshiftapps.com:6443"
    oc_token: "sha256~wjil1Y9TMrYFBBOP8iTOAUIP2BVDc_3v9eljdTCDJDQ"
    namespace: "aap-lab"

  tasks:

    - name: Create namespace
      kubernetes.core.k8s:
        host: "{{ oc_host }}"
        api_key: "{{ oc_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ namespace }}"
        state: present

    - name: Create Deployment nginx
      kubernetes.core.k8s:
        host: "{{ oc_host }}"
        api_key: "{{ oc_token }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx
            namespace: "{{ namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: nginx
            template:
              metadata:
                labels:
                  app: nginx
              spec:
                containers:
                  - name: nginx
                    image: nginxinc/nginx-unprivileged
                    ports:
                      - containerPort: 8080

    - name: Create Service nginx
      kubernetes.core.k8s:
        host: "{{ oc_host }}"
        api_key: "{{ oc_token }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx
            namespace: "{{ namespace }}"
          spec:
            selector:
              app: nginx
            ports:
              - port: 80
                targetPort: 8080

    - name: Create Route nginx (OpenShift)
      kubernetes.core.k8s:
        host: "{{ oc_host }}"
        api_key: "{{ oc_token }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: nginx
            namespace: "{{ namespace }}"
          spec:
            to:
              kind: Service
              name: nginx
            port:
              targetPort: 80
